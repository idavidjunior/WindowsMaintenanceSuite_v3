<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
  <title>Windows Maintenance Suite</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#64ffda" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="4" stroke="currentColor"/>
          <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 2v2M17 2v2M2 7h20" stroke="currentColor" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Windows Maintenance Suite</h1>
      <p class="subtitle">Ferramentas de manutenção, limpeza e diagnóstico do sistema</p>
    </header>

    <div class="grid">
      <section class="card" data-category="maintenance">
        <div class="card-header">
          <span class="card-icon">&#x1F527;</span>
          <h2>Manutenção</h2>
        </div>
        <div class="card-body">
          <button class="btn" data-opt="1"><span class="btn-label">Manutenção Essencial</span><span class="btn-num">1</span></button>
          <button class="btn" data-opt="2"><span class="btn-label">Manutenção Completa</span><span class="btn-num">2</span></button>
        </div>
      </section>

      <section class="card" data-category="cleaning">
        <div class="card-header">
          <span class="card-icon">&#x1F9F9;</span>
          <h2>Limpeza & Leveza</h2>
        </div>
        <div class="card-body">
          <button class="btn" data-opt="3"><span class="btn-label">Limpeza Profunda</span><span class="btn-num">3</span></button>
          <button class="btn" data-opt="4"><span class="btn-label">Sistema Leve</span><span class="btn-num">4</span></button>
        </div>
      </section>

      <section class="card" data-category="diagnostics">
        <div class="card-header">
          <span class="card-icon">&#x1F4CA;</span>
          <h2>Diagnósticos</h2>
        </div>
        <div class="card-body">
          <button class="btn" data-opt="5"><span class="btn-label">Diagnóstico Aprofundado</span><span class="btn-num">5</span></button>
          <button class="btn" data-opt="6"><span class="btn-label">Diagnóstico Inteligente (SMART)</span><span class="btn-num">6</span></button>
          <button class="btn" data-opt="7"><span class="btn-label">Monitor de Desempenho</span><span class="btn-num">7</span></button>
          <button class="btn" data-opt="8"><span class="btn-label">Gerenciador de Drivers</span><span class="btn-num">8</span></button>
        </div>
      </section>

      <section class="card" data-category="optimization">
        <div class="card-header">
          <span class="card-icon">&#x2699;&#xFE0F;</span>
          <h2>Otimização & Segurança</h2>
        </div>
        <div class="card-body">
          <button class="btn" data-opt="9"><span class="btn-label">Ajustes de Sistema (Tweaks)</span><span class="btn-num">9</span></button>
          <button class="btn" data-opt="10"><span class="btn-label">Backup do Registro</span><span class="btn-num">10</span></button>
          <button class="btn danger" data-opt="11"><span class="btn-label">Restaurar Registro</span><span class="btn-badge">CUIDADO!</span><span class="btn-num">11</span></button>
          <button class="btn" data-opt="12"><span class="btn-label">Manutenção Agendada</span><span class="btn-num">12</span></button>
          <button class="btn" data-opt="13"><span class="btn-label">Verificação de Vírus</span><span class="btn-num">13</span></button>
          <button class="btn" data-opt="14"><span class="btn-label">Varredura do Registro</span><span class="btn-num">14</span></button>
          <button class="btn" data-opt="15"><span class="btn-label">Ferramentas Nativas</span><span class="btn-num">15</span></button>
          <button class="btn" data-opt="16"><span class="btn-label">Analisador de Espaço</span><span class="btn-num">16</span></button>
          <button class="btn" data-opt="17"><span class="btn-label">Auto-Atualização</span><span class="btn-num">17</span></button>
          <button class="btn" data-opt="18"><span class="btn-label">Gerenciador de Pacotes</span><span class="btn-num">18</span></button>
          <button class="btn" data-opt="19"><span class="btn-label">Perfis de Otimização</span><span class="btn-num">19</span></button>
          <button class="btn" data-opt="20"><span class="btn-label">Hardening de Segurança</span><span class="btn-num">20</span></button>
        </div>
      </section>
    </div>

    <footer>
      <div class="status-bar" id="statusBar">
        <div class="status-indicator" id="statusIndicator"></div>
        <span id="statusText">Pronto. Selecione uma opção acima.</span>
      </div>
      <button class="btn-exit" id="btnExit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
        Sair
      </button>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
